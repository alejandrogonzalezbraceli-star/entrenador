* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0D0D0F; --bg2: #16161A; --bg3: #1E1E24;
  --surface: #242430; --surface2: #2A2A38; --border: #2E2E3A;
  --text: #E8E8ED; --text2: #9898A6; --text3: #64647A;
  --accent: #E85A4F; --accent2: #FF7B72;
  --blue: #58A6FF; --green: #3FB950; --orange: #F0883E;
  --purple: #BC8CFF; --red: #F85149;
  --protein: #58A6FF; --carbs: #F0883E; --fat: #BC8CFF;
  --radius: 14px; --radius-sm: 8px;
}
html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overscroll-behavior: none; }
body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

.app { max-width: 430px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; background: var(--bg); position: relative; overflow-x: hidden; }

.app-header { padding: 20px 20px 0; position: sticky; top: 0; z-index: 100; background: linear-gradient(to bottom, var(--bg) 80%, transparent); padding-bottom: 16px; }
.app-title { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 2px; }
.app-subtitle { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }

.tab-bar { display: flex; gap: 4px; margin-top: 16px; background: var(--bg2); border-radius: 12px; padding: 4px; }
.tab { flex: 1; padding: 10px 0; border: none; background: transparent; color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; border-radius: 10px; cursor: pointer; transition: all 0.25s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.tab svg { width: 18px; height: 18px; }

.content { padding: 0 20px 100px; }

.card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); transition: all 0.2s; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-title { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
.card-badge { font-family: 'Space Mono', monospace; font-size: 10px; padding: 4px 10px; border-radius: 20px; letter-spacing: 1px; }

.macro-rings { display: flex; justify-content: space-around; margin: 20px 0; }
.macro-ring { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.ring-outer { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
.ring-inner { width: 54px; height: 54px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; }
.ring-value { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; line-height: 1; }
.ring-unit { font-size: 9px; color: var(--text3); }
.ring-label { font-size: 11px; color: var(--text2); font-weight: 500; }

.week-strip { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; -webkit-overflow-scrolling: touch; }
.week-strip::-webkit-scrollbar { display: none; }
.week-day { flex-shrink: 0; width: 52px; padding: 10px 0; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
.week-day.active { border-color: var(--accent); transform: scale(1.05); }
.week-day-name { font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
.week-day-label { font-size: 9px; color: var(--text2); }
.week-day-dot { width: 6px; height: 6px; border-radius: 50%; margin: 6px auto 0; }

.exercise-list { display: flex; flex-direction: column; gap: 8px; }
.exercise-row { display: flex; align-items: center; padding: 12px; background: var(--bg2); border-radius: var(--radius-sm); gap: 10px; cursor: pointer; transition: background 0.15s; }
.exercise-row:active { background: var(--bg3); }
.exercise-info { flex: 1; min-width: 0; }
.exercise-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exercise-detail { font-size: 11px; color: var(--text2); margin-top: 2px; font-family: 'Space Mono', monospace; }
.exercise-weight { text-align: right; flex-shrink: 0; }
.exercise-weight-val { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; }
.exercise-rir { font-size: 10px; color: var(--text3); }

.meal-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; cursor: pointer; transition: background 0.15s; }
.meal-card:active { background: var(--bg3); }
.meal-header { display: flex; justify-content: space-between; align-items: center; }
.meal-left { display: flex; align-items: center; gap: 10px; }
.meal-icon { font-size: 20px; }
.meal-name { font-weight: 600; font-size: 14px; }
.meal-time { font-size: 11px; color: var(--text3); }
.meal-kcal { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text2); }
.meal-items { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.meal-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
.meal-item-name { color: var(--text); }
.meal-item-qty { color: var(--text3); font-size: 12px; }
.meal-item-macros { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text2); }

.progress-stat { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
.progress-stat:last-child { border-bottom: none; }
.stat-label { font-size: 13px; color: var(--text2); }
.stat-value { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; }
.progress-bar-bg { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-top: 8px; }
.progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

.meso-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.meso-tab { flex: 1; padding: 8px; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text2); background: var(--bg2); text-align: center; }
.meso-tab.active { color: white; }

.section-title { font-size: 17px; font-weight: 700; margin: 24px 0 12px; letter-spacing: -0.3px; }
.section-sub { font-size: 12px; color: var(--text3); margin-top: -8px; margin-bottom: 16px; }

.alert-card { background: linear-gradient(135deg, rgba(248,81,73,0.12), rgba(248,81,73,0.04)); border: 1px solid rgba(248,81,73,0.2); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start; }
.alert-card.info { background: linear-gradient(135deg, rgba(88,166,255,0.12), rgba(88,166,255,0.04)); border-color: rgba(88,166,255,0.2); }
.alert-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
.alert-text strong { color: var(--text); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.4s ease-out forwards; opacity: 0; }

.kcal-big { font-family: 'Space Mono', monospace; font-size: 40px; font-weight: 700; text-align: center; margin: 8px 0; letter-spacing: -2px; background: linear-gradient(135deg, var(--accent), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.kcal-label { text-align: center; font-size: 12px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; }

.diet-break-banner { background: linear-gradient(135deg, #C62828, #B71C1C); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; text-align: center; }
.diet-break-banner h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.diet-break-banner p { font-size: 11px; color: rgba(255,255,255,0.7); }

.checklist-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--bg2); border-radius: var(--radius-sm); margin-bottom: 6px; cursor: pointer; transition: all 0.15s; }
.checklist-item:active { background: var(--bg3); }
.check-box { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.check-box.checked { background: var(--green); border-color: var(--green); }
.check-text { font-size: 13px; }
.check-text.checked { text-decoration: line-through; color: var(--text3); }
</style>
</head>

// ── Components ──
function MacroRing({ value, unit, label, color }) {
  return (
    <div className="macro-ring">
      <div className="ring-outer" style={{ background: `conic-gradient(${color} 0%, ${color} 75%, var(--border) 75%, var(--border) 100%)` }}>
        <div className="ring-inner">
          <span className="ring-value" style={{ color }}>{value}</span>
          <span className="ring-unit">{unit}</span>
        </div>
      </div>
      <span className="ring-label">{label}</span>
    </div>
  );
}

function ExerciseRow({ ex, dayColor }) {
  return (
    <div className="exercise-row" style={{ borderLeft: `3px solid ${ex.type === "C" ? dayColor : "var(--text3)"}` }}>
      <div className="exercise-info">
        <div className="exercise-name">{ex.name}</div>
        <div className="exercise-detail">{ex.sets}\u00D7{ex.reps} \u00B7 RIR {ex.rir} \u00B7 {ex.rest}</div>
      </div>
      <div className="exercise-weight">
        <div className="exercise-weight-val">{ex.weight}</div>
        <div className="exercise-rir">{ex.type === "C" ? "COMP" : "AISL"}</div>
      </div>
    </div>
  );
}

function MealCard({ meal }) {
  const [open, setOpen] = useState(false);
  const totalKcal = meal.items.reduce((s, i) => s + i.kcal, 0);
  return (
    <div className="meal-card" onClick={() => setOpen(!open)}>
      <div className="meal-header">
        <div className="meal-left">
          <span className="meal-icon">{meal.icon}</span>
          <div>
            <div className="meal-name">{meal.name}</div>
            <div className="meal-time">{meal.time}</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span className="meal-kcal">{totalKcal} kcal</span>
          {open ? <IconChevronUp size={14} color="#64647A" /> : <IconChevronDown size={14} color="#64647A" />}
        </div>
      </div>
      {open && (
        <div className="meal-items">
          {meal.items.map((item, i) => (
            <div className="meal-item" key={i}>
              <div>
                <span className="meal-item-name">{item.food}</span>
                <span className="meal-item-qty"> \u00B7 {item.qty}</span>
              </div>
              <span className="meal-item-macros">{item.p}P {item.g}G {item.c}C</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DashboardTab() {
  const [week, setWeek] = useState(1);
  const mesoNum = week <= 4 ? 1 : week <= 8 ? 2 : 3;
  const meso = MESO_INFO[mesoNum - 1];
  const isDietBreak = week === 8;
  const isDeload = week === 4 || week === 8 || week === 12;
  const progressPct = ((week) / 12 * 100).toFixed(0);
  const estWeight = (80 - (week * 0.45)).toFixed(1);

  return (
    <div className="content fade-up">
      <div className="section-title">Semana {week} de 12</div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, overflowX: "auto", paddingBottom: 4, WebkitOverflowScrolling: "touch" }}>
        {[...Array(12)].map((_, i) => (
          <button key={i} onClick={() => setWeek(i + 1)} style={{
            flex: "0 0 auto", width: 34, height: 34, borderRadius: 10, border: "none",
            background: week === i + 1 ? MESO_INFO[i < 4 ? 0 : i < 8 ? 1 : 2].color : "var(--bg2)",
            color: week === i + 1 ? "#fff" : "var(--text3)",
            fontFamily: "'Space Mono', monospace", fontSize: 12, fontWeight: 700, cursor: "pointer",
            transition: "all 0.2s",
          }}>{i + 1}</button>
        ))}
      </div>

      <div className="card" style={{ borderTop: `3px solid ${meso.color}` }}>
        <div className="card-header">
          <span className="card-title">Meso {mesoNum}: {meso.name}</span>
          <span className="card-badge" style={{ background: `${meso.color}22`, color: meso.color }}>{meso.weeks}</span>
        </div>
        <p style={{ fontSize: 13, color: "var(--text2)", lineHeight: 1.5 }}>{meso.desc}</p>
        {isDeload && !isDietBreak && (
          <div style={{ marginTop: 10, padding: "8px 12px", background: "rgba(255,199,0,0.1)", borderRadius: 8, fontSize: 12, color: "#FFD54F" }}>
            <strong>DELOAD</strong> — Volumen reducido. Recuperaci\u00F3n.
          </div>
        )}
      </div>

      {isDietBreak && (
        <div className="diet-break-banner">
          <h3>DIET BREAK</h3>
          <p>Calor\u00EDas a mantenimiento (2.800 kcal). Carbos \u2191 a 370g. No es cheat week.</p>
        </div>
      )}

      <div className="card">
        <div className="kcal-label">objetivo diario</div>
        <div className="kcal-big">{isDietBreak ? "2.800" : "2.300"}</div>
        <div className="kcal-label">kcal</div>
        <div className="macro-rings">
          <MacroRing value={180} unit="g" label="Prote\u00EDna" color="var(--protein)" />
          <MacroRing value={isDietBreak ? 370 : 235} unit="g" label="Carbos" color="var(--carbs)" />
          <MacroRing value={70} unit="g" label="Grasa" color="var(--fat)" />
        </div>
      </div>

      <div className="card">
        <div className="card-title" style={{ marginBottom: 12 }}>Progreso estimado</div>
        <div className="progress-stat">
          <span className="stat-label">Semana</span>
          <span className="stat-value">{week}/12</span>
        </div>
        <div className="progress-bar-bg">
          <div className="progress-bar-fill" style={{ width: `${progressPct}%`, background: `linear-gradient(90deg, ${meso.color}, var(--accent))` }} />
        </div>
        <div className="progress-stat" style={{ marginTop: 8 }}>
          <span className="stat-label">Peso estimado</span>
          <span className="stat-value" style={{ color: "var(--green)" }}>{estWeight} kg</span>
        </div>
        <div className="progress-stat">
          <span className="stat-label">P\u00E9rdida total est.</span>
          <span className="stat-value">{(80 - estWeight).toFixed(1)} kg</span>
        </div>
        <div className="progress-stat">
          <span className="stat-label">Ritmo</span>
          <span className="stat-value">~0.45-0.5 kg/sem</span>
        </div>
      </div>

      <div className="section-title">Semana tipo</div>
      <div className="week-strip">
        {WEEK_SCHEDULE.map((d, i) => (
          <div key={i} className="week-day" style={{ background: `${d.color}15` }}>
            <div className="week-day-name" style={{ color: d.color }}>{d.day}</div>
            <div className="week-day-label">{d.label}</div>
            {d.cardio && <div style={{ fontSize: 9, color: "var(--green)", marginTop: 4 }}>\uD83D\uDEB6</div>}
            <div className="week-day-dot" style={{ background: d.type === "train" ? d.color : "var(--border)" }} />
          </div>
        ))}
      </div>
    </div>
  );
}

        </div>
      </div>
    </div>
  );
}

// ── App ──
function App() {
  const [tab, setTab] = useState(0);

  const tabs = [
    { label: "Panel", icon: <IconActivity size={18} /> },
    { label: "Entreno", icon: <IconDumbbell size={18} /> },
    { label: "Dieta", icon: <IconUtensils size={18} /> },
    { label: "Check", icon: <IconCheck size={18} /> },
  ];

  return (
    <div className="app">
      <div className="app-header">
        <div className="app-title">Definici\u00F3n \u00B7 12 semanas</div>
        <div className="app-subtitle">
          {tab === 0 && "Panel de control"}
          {tab === 1 && "Entrenamiento"}
          {tab === 2 && "Nutrici\u00F3n"}
          {tab === 3 && "Checklist"}
        </div>
        <div className="tab-bar">
          {tabs.map((t, i) => (
            <button key={i} className={`tab ${tab === i ? "active" : ""}`} onClick={() => setTab(i)}>
              {t.icon}
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {tab === 0 && <DashboardTab />}
      {tab === 1 && <TrainingTab />}
      {tab === 2 && <NutritionTab />}
      {tab === 3 && <ChecklistTab />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
